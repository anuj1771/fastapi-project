<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - BrandBridge</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
  <main class="max-w-md mx-auto px-6 py-12">
    <section class="bg-white rounded-xl shadow p-6">
      <h1 class="text-2xl font-semibold mb-2">Reset password</h1>
      <p class="text-sm text-gray-600 mb-4">Enter a new password for your account.</p>

      {% if success %}
        <div class="mb-4 rounded border border-green-200 bg-green-50 p-3 text-green-700 text-sm">
          {{ success }}
        </div>
      {% endif %}
      {% if error %}
        <div class="mb-4 rounded border border-red-200 bg-red-50 p-3 text-red-700 text-sm">
          {{ error }}
        </div>
      {% endif %}

      <form action="/ui/reset-password" method="post" class="space-y-3">
        <input type="hidden" name="token" value="{{ token }}" />
        <input class="w-full border rounded p-2" name="new_password" type="password" placeholder="new password" required />
        <button class="w-full bg-emerald-600 text-white py-2 rounded">Update password</button>
      </form>
    </section>
  </main>
</body>
</html>
